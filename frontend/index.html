<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Máquina Expendedora EC3 - UCSUR</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="franja-ucsur">
    <span class="franja-logo">UNIVERSIDAD <strong>CIENTÍFICA</strong> DEL SUR</span>
    <span class="franja-curso">EC3 — Algoritmia y Estructuras de Datos</span>
  </div>

  <div class="contenedor">

    <div class="header">
      <span class="header-title">Máquina Expendedora</span>
      <span class="header-badge">EC3 · UCSUR · 2026</span>
    </div>

    <div class="maquina">

      <div class="panel-productos">
        <div class="titulo-maquina">Seleccione un producto</div>
        <div class="grid-productos" id="grid-productos"></div>
      </div>

      <div class="panel-control">

        <div class="display">
          <div class="display-estado" id="display-estado">LISTO</div>
          <div class="display-dinero">S/ <span id="display-monto">0.00</span></div>
          <div class="display-mensaje" id="display-mensaje">Inserte dinero y seleccione un producto</div>
        </div>

        <div class="seccion-label">
          Monedas
          <span class="toggle-moneda" id="toggle-moneda" onclick="toggleMoneda()">🇺🇸 $ USD</span>
        </div>
        <div class="botones-dinero" id="botones-monedas"></div>

        <div class="seccion-label">Billetes</div>
        <div class="botones-dinero" id="botones-billetes"></div>

        <button class="btn-cancelar" onclick="cancelar()">Cancelar / Devolver</button>

        <div class="seccion-label">Última compra</div>
        <div class="historial" id="historial">—</div>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
